# ==================================================
# 全局基础配置
# ==================================================

# 锁文件路径，防止多个实例同时运行
# 如果需要同时运行多个实例，可以将程序复制多份，每份设置不同的为实例锁路径
# 或直接运行多个Docker容器，容器不受实例锁限制且环境互相隔离
lock_file = "/tmp/smartarchiver.lock"

# 文件操作失败时的最大重试次数
max_retries = 3

# 日志文件存储目录
log_dir = "./logs"

# 日志级别，可选值："DEBUG", "INFO", "WARNING", "ERROR"
log_level = "INFO"

# 保留的日志文件数量（0 表示不清理）
max_log_files = 30

# ==================================================
# 定时任务配置（可选）
# ==================================================
# 如果不配置 [schedule] 块，程序将作为一次性脚本执行

# [schedule]
# 定时模式："cron" 或 "interval"
# mode = "cron"

# cron 模式下的表达式（示例：每小时执行一次）
# cron_expr = "0 * * * *"

# interval 模式下的间隔秒数（任务执行完毕后开始计时）
# interval_seconds = 3600

# ==================================================
# 任务列表
# ==================================================

[[tasks]]
# 【选填】任务名称，可自定义
name = "普通移动/复制任务示例"

source = "./source" # 源目录路径
dest = "./dest"     # 目标目录路径

# 【必填】任务执行模式：
# "move" - 移动文件到目标目录
# "copy" - 复制文件到目标目录
mode = "copy"

# 【必填】文件最小年龄（分钟），只有修改时间超过此时间的文件才会被处理
# 注意：所有操作（包括删除规则）都必须满足此时间阈值
min_age_minutes = 180

# 【必填】文件冲突处理策略：
# "overwrite" - 覆盖目标文件
# "skip" - 跳过已存在的文件
# "copy" - 创建带编号的副本（如 file-1.txt）
conflict_policy = "overwrite"

# 【必填】是否删除源目录中的空目录
remove_empty_dirs = true

# 匹配规则说明 (适用于 move 和 copy 模式)：
# 1. 匹配方式 (大小写不敏感):
#    - "example.txt" : 完全匹配
#    - "example*"    : 前缀匹配
#    - "*example"    : 后缀匹配
#    - "*example*"   : 包含匹配
#    - "*"           : 匹配所有
#
# 2. 优先级逻辑:
#    - 默认情况下：保留规则 (keep_rules) > 删除规则 (delete_rules) > 正常传输
#    - 如果一个文件同时命中保留和删除规则，默认将被【保留】。
#    - 可以通过 preferred_rule 配置项修改此行为。
#
# 3. 大小阈值:
#    - 仅当文件/目录大小【小于/大于等于】设定的阈值时，规则才会生效。lt 为小于，ge 为大于等于。
#    - 如果希望匹配所有大小，请使用 ge 规则并设置为 "0"（例如: "*.log" = "0"）。
#    - 支持单位: B, KB, MB, GB, TB (例如: "10MB", "1.5GB")。

# 【选填】当文件/目录同时命中保留规则和删除规则时的处理方式：
# "keep" - 保留文件（默认）
# "delete" - 删除文件
preferred_rule = "keep"

# 【选填】保留规则：命中的文件/目录将留在原处，不进行移动、复制或删除
[tasks.keep_rules.dirs.ge]
# "Favorites" = "0"          # 始终保留名为 Favorites 的目录

[tasks.keep_rules.files.ge]
# "*.raw" = "0"              # 始终保留所有 .raw 文件
# "*.mp4" = "1GB"              # 保留大于等于 1GB 的 .mp4 文件

# 【选填】删除规则：命中的文件/目录将被直接删除，不移动到目标目录
[tasks.delete_rules.dirs.ge]
# "*temp*" = "0"              # 删除所有包含 temp 的目录

[tasks.delete_rules.files.ge]
# "desktop.ini" = "0"        # 删除所有 desktop.ini 文件
# "*.DS_Store" = "0"         # 删除所有后缀为 .DS_Store 的文件

[tasks.delete_rules.files.lt]
# "*.mp4" = "1MB"              # 删除小于 1MB 的 .mp4 文件

# --------------------------------------------------

[[tasks]]
name = "轮转移动任务示例"

source = "./source"
dest = "./dest"

# 【必填】任务执行模式：
# "rotate" - 轮转模式
# 当源目录总体积超过 size_limit 或文件总数超过 count_limit 时，将最旧的文件移动到目标目录
mode = "rotate"

#【以下两项必填至少一项】
size_limit = "1GB"    # 目录总体积限制，支持单位: B, KB, MB, GB, TB，0 表示不限制。
count_limit = 20    # 目录文件总数量限制，0 表示不限制。

conflict_policy = "overwrite"
remove_empty_dirs = true
preferred_rule = "keep"

[tasks.keep_rules.dirs.lt]

[tasks.keep_rules.files.lt]

[tasks.delete_rules.dirs.lt]

[tasks.delete_rules.files.lt]

# --------------------------------------------------

[[tasks]]
name = "白名单移动/复制任务示例"

source = "./source"
dest = "./dest"

# 【必填】任务执行模式：
# "whitelist_move" - 白名单移动模式（仅移动命中 whitelist_rules 的文件/目录，忽略 keep_rules 和 delete_rules）
# "whitelist_copy" - 白名单复制模式（仅复制命中 whitelist_rules 的文件/目录，忽略 keep_rules 和 delete_rules）
mode = "whitelist_copy"

min_age_minutes = 180
conflict_policy = "overwrite"
remove_empty_dirs = true

# 【必填至少一项】白名单规则（仅在 whitelist_move 和 whitelist_copy 模式下生效）：
# 命中的文件/目录将被移动或复制，未命中的将被忽略
[tasks.whitelist_rules.dirs.ge]
# "Important" = "0"          # 仅处理名为 Important 的目录

[tasks.whitelist_rules.files.ge]
# "*.pdf" = "0"              # 仅处理所有 .pdf 文件

# --------------------------------------------------

[[tasks]]
name = "同步任务示例"

source = "./source-2"
dest = "./dest-2"

# 【必填】任务执行模式：
# "sync" - 将源目录以镜像方式同步到目标目录
mode = "sync"

# 【选填】排除同步的文件或目录（支持通配符，由 rclone/rsync 处理）
# exclude = ["*.tmp", "node_modules/"]

# 【选填】是否为要替换或删除的文件复制副本
# create_backups = true

# 【选填】最多保留的副本份数（0 表示不限制）
# max_backups = 5
