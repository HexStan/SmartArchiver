# ==================================================
# 全局基础配置
# ==================================================

# 锁文件路径，防止多个实例同时运行
lock_file = "/tmp/smartarchiver.lock"

# 文件操作失败时的最大重试次数
max_retries = 3

# 日志文件存储目录
log_dir = "./logs"

# 日志级别，可选值："DEBUG", "INFO", "WARNING", "ERROR"
log_level = "INFO"

# 保留的日志文件数量（0 表示不清理）
max_log_files = 30

# ==================================================
# 定时任务配置（可选）
# ==================================================
# 如果不配置 [schedule] 块，程序将作为一次性脚本执行

# [schedule]
# 定时模式："cron" 或 "interval"
# mode = "cron"

# cron 模式下的表达式（示例：每小时执行一次）
# cron_expr = "0 * * * *"

# interval 模式下的间隔秒数（任务执行完毕后开始计时）
# interval_seconds = 3600

# ==================================================
# 任务列表
# ==================================================

# move、copy 模式示例任务
[[tasks]]
source = "./source" # 源目录路径
dest = "./dest"     # 目标目录路径

# 【必填】任务执行模式：
# "move" - 移动文件到目标目录
# "copy" - 复制文件到目标目录
# "sync" - 将源目录以镜像方式同步到目标目录
mode = "copy"

# 【必填】文件最小年龄（分钟），只有修改时间超过此时间的文件才会被处理
min_age_minutes = 180

# 【必填】文件冲突处理策略：
# "overwrite" - 覆盖目标文件
# "skip" - 跳过已存在的文件
# "copy" - 创建带编号的副本（如 file-1.txt）
conflict_policy = "overwrite"

# 【必填】是否删除源目录中的空目录
remove_empty_dirs = true

# 【选填】删除规则
# [tasks.delete_rules.dirs]
# 目录名匹配规则 = 大小阈值
# "ALL" 表示匹配所有大小
# "temp*" = "ALL"              # 删除所有以 temp 开头的目录
# "*cache*" = "ALL"            # 删除所有包含 cache 的目录

# [tasks.delete_rules.files]
# 文件名匹配规则 = 大小阈值
# "*.zip" = "ALL"              # 删除所有以 .zip 结尾的文件
# "*.tmp" = "ALL"              # 删除所有以 .tmp 结尾的文件
# "*.log" = "10MB"             # 删除小于 10MB 的以 .log 结尾的文件
# "*" = "1MB"                  # 删除所有小于 1MB 的文件

# 【选填】保留规则
# [tasks.keep_rules.dirs]
# "important" = "ALL"          # 保留名为 important 的目录

# [tasks.keep_rules.files]
# "*.raw" = "ALL"              # 保留所有以 .raw 结尾的文件
# "*.ini" = "ALL"              # 保留所有以 .ini 结尾的文件
# "*.jpg" = "50KB"             # 保留小于 50KB 的以 .jpg 结尾的文件
# "*" = "10MB"                 # 保留所有小于 10MB 的文件

# --------------------------------------------------

# sync 模式示例任务
[[tasks]]
source = "./source-2" # 源目录路径
dest = "./dest-2"     # 目标目录路径

# 【必填】任务执行模式：
# "move" - 移动文件到目标目录
# "copy" - 复制文件到目标目录
# "sync" - 将源目录以镜像方式同步到目标目录
mode = "sync"

# 【选填】排除同步的文件或目录（支持通配符）
# exclude = ["*.tmp", "node_modules/"]

# 【选填】是否为要替换或删除的文件复制副本
# create_backups = true

# 【选填】最多保留的副本份数（0 表示不限制）
# max_backups = 5
