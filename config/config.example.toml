# ==================================================
# 全局基础配置
# ==================================================

# 锁文件路径，防止多个实例同时运行
lock_file = "/tmp/smartarchiver.lock"

# 文件操作失败时的最大重试次数
max_retries = 3

# 日志文件存储目录
log_dir = "./logs"

# 日志级别，可选值："DEBUG", "INFO", "WARNING", "ERROR"
log_level = "INFO"

# 保留的日志文件数量（0 表示不清理）
max_log_files = 30

# ==================================================
# 定时任务配置（可选）
# ==================================================
# 如果不配置 [schedule] 块，程序将作为一次性脚本执行

# [schedule]
# 定时模式："cron" 或 "interval"
# mode = "cron"

# cron 模式下的表达式（示例：每小时执行一次）
# cron_expr = "0 * * * *"

# interval 模式下的间隔秒数（任务执行完毕后开始计时）
# interval_seconds = 3600

# ==================================================
# 任务列表
# ==================================================

# move、copy 模式示例任务
[[tasks]]
source = "./source" # 源目录路径
dest = "./dest"     # 目标目录路径

# 【必填】任务执行模式：
# "move" - 移动文件到目标目录
# "copy" - 复制文件到目标目录
# "sync" - 将源目录以镜像方式同步到目标目录
mode = "copy"

# 【必填】文件最小年龄（分钟），只有修改时间超过此时间的文件才会被处理
# 注意：所有操作（包括删除规则）都必须满足此时间阈值
min_age_minutes = 180

# 【必填】文件冲突处理策略：
# "overwrite" - 覆盖目标文件
# "skip" - 跳过已存在的文件
# "copy" - 创建带编号的副本（如 file-1.txt）
conflict_policy = "overwrite"

# 【必填】是否删除源目录中的空目录
remove_empty_dirs = true

# 匹配规则说明 (适用于 move 和 copy 模式)：
# 1. 匹配方式 (大小写不敏感):
#    - "example.txt" : 完全匹配
#    - "example*"    : 前缀匹配
#    - "*example"    : 后缀匹配
#    - "*example*"   : 包含匹配
#    - "*"           : 匹配所有
#
# 2. 优先级逻辑:
#    - 默认情况下：保留规则 (keep_rules) > 删除规则 (delete_rules) > 正常传输
#    - 如果一个文件同时命中保留和删除规则，默认将被【保留】。
#    - 可以通过 rule_conflict_policy 配置项修改此行为。
#
# 3. 大小阈值:
#    - 仅当文件/目录大小【小于】设定的阈值时，规则才会生效。
#    - 使用 "ALL" 表示匹配所有大小。
#    - 支持单位: B, KB, MB, GB, TB (例如: "10MB", "1.5GB")。

# 【选填】当文件/目录同时命中保留规则和删除规则时的处理方式：
# "keep" - 保留文件（默认）
# "delete" - 删除文件
# rule_conflict_policy = "keep"

# 【选填】保留规则：命中的文件/目录将留在原处，不进行移动、复制或删除
[tasks.keep_rules.dirs]
# "Favorites" = "ALL"          # 始终保留名为 Favorites 的目录

[tasks.keep_rules.files]
# "*.raw" = "ALL"              # 始终保留所有 .raw 文件

# 【选填】删除规则：命中的文件/目录将被直接删除，不移动到目标目录
[tasks.delete_rules.dirs]
# "*temp*" = "ALL"              # 删除所有包含 temp 的目录

[tasks.delete_rules.files]
# "desktop.ini" = "ALL"        # 删除所有 desktop.ini 文件
# "*.DS_Store" = "ALL"         # 删除所有后缀为 .DS_Store 的文件

# --------------------------------------------------

# sync 模式示例任务
[[tasks]]
source = "./source-2" # 源目录路径
dest = "./dest-2"     # 目标目录路径

# 【必填】任务执行模式：
# "move" - 移动文件到目标目录
# "copy" - 复制文件到目标目录
# "sync" - 将源目录以镜像方式同步到目标目录
mode = "sync"

# 【选填】排除同步的文件或目录（支持通配符，由 rclone/rsync 处理）
# exclude = ["*.tmp", "node_modules/"]

# 【选填】是否为要替换或删除的文件复制副本
# create_backups = true

# 【选填】最多保留的副本份数（0 表示不限制）
# max_backups = 5
